<!DOCTYPE html>
<html>
<head>
    <title>Admin Panel - SaveServe AI</title>
</head>

<body style="margin:0; font-family: Arial, sans-serif; background: linear-gradient(to right, #56ab2f, #a8e063);">

    <!-- HEADER -->
    <div style="text-align:center; padding: 40px; color:white;">
        <h1>👨‍💼 Admin Panel</h1>
        <p>Advanced Food Waste Prediction System</p>
        <p>🏨 {{ hotel }}</p>
        <p>📍 {{ city }}</p>
    </div>

    <!-- FORM BOX -->
    <div style="background:white; width:600px; margin:auto; padding:30px; border-radius:15px; box-shadow:0px 10px 25px rgba(0,0,0,0.2);">

        <form action="/predict" method="POST">

            <h3 style="text-align:center;">🍽 Food Categories</h3>

            <!-- GRID START -->
            <div style="display:grid; grid-template-columns: repeat(3, 1fr); gap:15px;">

                <!-- CATEGORY BLOCK -->
                {% for i in range(1,4) %}
                <div style="border:1px solid #ddd; padding:10px; border-radius:10px;">

                    <label>Category {{ i }}</label><br>

                    <select name="type{{i}}" style="width:100%; padding:6px;">
                        <option value="meal">Meal</option>
                        <option value="seafood">Seafood</option>
                        <option value="frozen">Frozen</option>
                        <option value="pasta">Pasta</option>
                        <option value="bakery">Bakery</option>
                        <option value="bbq">BBQ</option>
                        <option value="dessert">Dessert</option>
                        <option value="beverages">Beverages</option>
                        <option value="vegan">Vegan</option>
                    </select><br><br>

                    <input type="number" name="food{{i}}" placeholder="Prepared" min="0"
                        style="width:100%; padding:6px;"><br><br>

                    <input type="number" name="people{{i}}" placeholder="Served" min="0"
                        style="width:100%; padding:6px;">

                </div>
                {% endfor %}

            </div>
            <!-- GRID END -->

            <br>

            <!-- DAYS -->
            <label>Number of Days</label><br>
            <input type="number" name="days" required min="1"
                style="width:100%; padding:10px;"><br><br>

            <!-- BUTTON -->
            <button type="submit"
                style="width:100%; background:#27ae60; color:white; padding:12px; border:none; border-radius:8px;">
                Predict Now 🚀
            </button>

        </form>

        <!-- HISTORY -->
        <br><br>
        <a href="/history"
           style="display:block; text-align:center; background:#3498db; color:white; padding:10px; border-radius:8px; text-decoration:none;">
           📂 View History
        </a>

        <!-- LOGOUT -->
        <br>
        <a href="/logout"
           style="display:block; text-align:center; color:red; text-decoration:none;">
           Logout
        </a>

    </div>

</body>
</html>
